name: Build (macOS)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build app bundles
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: hdhr-mpv-macos
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      # Attach the bundles to the GitHub Release that triggered this run, so they
      # show up under the release's Assets (workflow artifacts above are only
      # reachable from the Actions run, not the Releases tab).
      - name: Attach bundles to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
