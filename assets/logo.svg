<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1b30"/>
      <stop offset="0.55" stop-color="#0a1120"/>
      <stop offset="1" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="298" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#7c5bd6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7c5bd6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="220" y1="252" x2="316" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd6ff"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="sheen" x1="256" y1="20" x2="256" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="256" cy="256" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0.62" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#ffffff" opacity="0.025"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mask"><rect width="512" height="512" rx="114"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#tile)"/>

  <g clip-path="url(#mask)">
    <rect width="512" height="512" fill="url(#glow)"/>
    <rect width="512" height="512" fill="url(#scan)"/>
    <rect width="512" height="250" fill="url(#sheen)"/>

    <!-- rabbit-ear antennas + OTA signal -->
    <g stroke-linecap="round">
      <path d="M250 234 L198 150" stroke="#b9c8e6" stroke-width="7"/>
      <path d="M262 234 L328 150" stroke="#b9c8e6" stroke-width="7"/>
      <circle cx="195" cy="146" r="11" fill="#7dd6ff"/>
      <circle cx="331" cy="146" r="11" fill="#a855f7"/>
      <circle cx="256" cy="236" r="9" fill="#b9c8e6"/>
      <path d="M347 132 A22 22 0 0 1 351 162" stroke="#38bdf8" stroke-width="5.5" fill="none" opacity="0.8"/>
      <path d="M360 122 A36 36 0 0 1 366 170" stroke="#38bdf8" stroke-width="5.5" fill="none" opacity="0.45"/>
    </g>

    <!-- play triangle -->
    <path d="M214 248 L214 362 L320 305 Z" fill="url(#play)" stroke="url(#play)"
          stroke-width="16" stroke-linejoin="round" filter="url(#soft)"/>

    <rect width="512" height="512" fill="url(#vignette)"/>
    <rect x="3" y="3" width="506" height="506" rx="111" fill="none"
          stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  </g>
</svg>
